name: PR Check — Migration & Code Validation

on:
  pull_request:
    branches:
      - main
      - develop
    types: [opened, synchronize, reopened]

concurrency:
  group: pr-check-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate-migrations:
    name: Validate Supabase Migrations
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Check migration file naming convention
        run: |
          echo "Checking migration file naming convention..."
          INVALID_FILES=$(find supabase/migrations -name "*.sql" | grep -vE '/[0-9]{14}_[a-z0-9_]+\.sql$' || true)
          if [ -n "$INVALID_FILES" ]; then
            echo "ERROR: Invalid migration file names found:"
            echo "$INVALID_FILES"
            echo "Migration files must follow pattern: YYYYMMDDHHMMSS_description.sql"
            exit 1
          fi
          echo "All migration files follow naming convention."

      - name: Check for duplicate migration timestamps
        run: |
          echo "Checking for duplicate migration timestamps..."
          TIMESTAMPS=$(find supabase/migrations -name "*.sql" | sed 's/.*\/\([0-9]\{14\}\)_.*/\1/' | sort)
          DUPLICATES=$(echo "$TIMESTAMPS" | uniq -d)
          if [ -n "$DUPLICATES" ]; then
            echo "ERROR: Duplicate migration timestamps found: $DUPLICATES"
            exit 1
          fi
          echo "No duplicate timestamps found."

      - name: Validate SQL syntax (basic check)
        run: |
          echo "Validating SQL files..."
          for f in supabase/migrations/*.sql; do
            echo "Checking: $f"
            # Check for common SQL issues
            if grep -qiE "DROP TABLE [^I]" "$f" 2>/dev/null; then
              echo "WARNING: Potentially destructive DROP TABLE found in $f (use DROP TABLE IF EXISTS)"
            fi
            if grep -qiE "DELETE FROM [^p]" "$f" 2>/dev/null; then
              echo "WARNING: Bulk DELETE found in $f — ensure this is intentional"
            fi
          done
          echo "SQL validation complete."

      - name: Check config.toml exists
        run: |
          if [ ! -f "supabase/config.toml" ]; then
            echo "ERROR: supabase/config.toml not found"
            exit 1
          fi
          echo "config.toml exists."

      - name: Validate Flutter project structure
        run: |
          echo "Checking Flutter project structure..."
          if [ ! -f "pubspec.yaml" ]; then
            echo "ERROR: pubspec.yaml not found"
            exit 1
          fi
          if [ ! -f "lib/main.dart" ]; then
            echo "ERROR: lib/main.dart not found"
            exit 1
          fi
          echo "Flutter project structure is valid."

      - name: Check for hardcoded secrets
        run: |
          echo "Scanning for hardcoded secrets..."
          # Check for common secret patterns (excluding env.json and test files)
          FOUND_SECRETS=$(grep -rn \
            --include="*.dart" \
            --include="*.sql" \
            --include="*.yaml" \
            --include="*.yml" \
            -E "(password|secret|api_key|apikey)\s*=\s*['\"][^'\"]{8,}['\"]" \
            --exclude-dir=".git" \
            --exclude-dir="node_modules" \
            . 2>/dev/null | \
            grep -v "env(" | \
            grep -v "fromEnvironment" | \
            grep -v "example" | \
            grep -v "test" | \
            grep -v "seed.sql" || true)
          if [ -n "$FOUND_SECRETS" ]; then
            echo "WARNING: Potential hardcoded secrets found:"
            echo "$FOUND_SECRETS"
            echo "Please use environment variables instead."
          fi
          echo "Secret scan complete."

      - name: Check branch naming convention
        run: |
          BRANCH="${{ github.head_ref }}"
          echo "Checking branch: $BRANCH"
          if [[ "$BRANCH" =~ ^(feature|fix|hotfix|chore|docs|refactor)/[a-z0-9-]+$ ]] || \
             [[ "$BRANCH" == "develop" ]] || \
             [[ "$BRANCH" == "main" ]]; then
            echo "Branch name '$BRANCH' follows convention."
          else
            echo "WARNING: Branch name '$BRANCH' does not follow convention."
            echo "Recommended: feature/*, fix/*, hotfix/*, chore/*, docs/*, refactor/*"
          fi

  lint-flutter:
    name: Flutter Lint & Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Run Flutter analyze
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      - name: Check Flutter formatting
        run: dart format --output=none --set-exit-if-changed lib/
        continue-on-error: true

  summary:
    name: PR Check Summary
    runs-on: ubuntu-latest
    needs: [validate-migrations, lint-flutter]
    if: always()

    steps:
      - name: Report status
        run: |
          echo "=== PR Check Summary ==="
          echo "Migration validation: ${{ needs.validate-migrations.result }}"
          echo "Flutter lint: ${{ needs.lint-flutter.result }}"
          
          if [ "${{ needs.validate-migrations.result }}" == "failure" ]; then
            echo "FAILED: Migration validation failed. Please fix before merging."
            exit 1
          fi
          echo "All required checks passed."
